<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1 class="heading">Top Rated Books</h1>
    <div class="grid">
        {% for i in range(book_name|length) %}
        <div class="card">
            <img src="{{ image[i] }}" alt="Book Image">
            <h3>{{ book_name[i] }}</h3>
            <p>Author: {{ author[i] }}</p>
            <p>⭐ {{ rating[i]|round(2) }} | 🗳️ {{ votes[i] }}</p>
        </div>
        {% endfor %}
    </div>

    <div class="button-container">
        <a href="/recommend" class="btn">Get Recommendations</a>
    </div>
</body>
</html>
