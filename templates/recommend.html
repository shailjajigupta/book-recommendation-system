<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1 class="heading">Find Your Next Read</h1>

    <form action="/recommend_books" method="post" class="search-bar">
        <input type="text" name="user_input" placeholder="Enter a book title..." required>
        <button type="submit" class="btn">Recommend</button>
    </form>

    <div class="grid">
        {% if data %}
            {% for i in data %}
            <div class="card">
                <img src="{{ i[2] }}" alt="Book Image">
                <h3>{{ i[0] }}</h3>
                <p>Author: {{ i[1] }}</p>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="button-container">
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
